# W1.2 모의해킹 조치 — 어드민 로그인 brute-force 차단 (nginx 레벨).
#
# 앱 내부(route.ts)의 in-memory 카운터는 replica 3개 round-robin 환경에서
# 프로세스별로 쪼개져 전역 잠금이 되지 않는다. nginx 는 3개 replica 앞의 단일
# 관문이므로 여기서 IP당 속도를 제한하면 토폴로지와 무관하게 전역 적용된다.
#
# 이 파일은 http{} 블록에 포함되어야 한다 (표준 nginx 에서 /etc/nginx/conf.d/*.conf
# 는 자동으로 http{} 안에 include 됨). limit_req 지시자는 server 블록의
# /api/auth/admin/login location 에 추가한다 (deploy 안내 참고).
#
# rate=5r/m  : IP당 분당 5회 (앱 정책과 동일)
# zone=10m   : 약 16만 IP 추적 가능
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

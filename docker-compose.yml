services:
  lg-magazine:
    build:
      context: .
    image: lg-magazine:latest
    # 3 replicas, each binding one host port in the 3002-3004 range.
    # nginx load-balances across all three.
    ports:
      - "127.0.0.1:3002-3004:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2g

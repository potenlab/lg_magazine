# Project name is fixed here so `docker compose` always targets the running
# `lg_magazine` stack (no COMPOSE_PROJECT_NAME override needed).
name: lg_magazine
services:
  lg-magazine:
    build:
      context: .
    image: lg-magazine:latest
    # 3 replicas, each binding one host port in the 3002-3004 range.
    # nginx load-balances across all three.
    ports:
      - "127.0.0.1:3002-3004:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # MSSQL (production branch) — credentials come from the server .env
      MSSQL_SERVER: mssql
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: ${MSSQL_DATABASE:-lg_magazine}
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD}
      MSSQL_ENCRYPT: "true"
      MSSQL_TRUST_SERVER_CERT: "true"
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2g

  # MSSQL database — "include MSSQL on server" (production branch only).
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mssql-data:
